<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Email confirmado — Ópticas Florida Inca</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #FAFAF7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 24px; box-sizing: border-box;
    }
    .card {
      background: #fff; border: 1px solid rgba(26,26,26,0.08); border-radius: 20px;
      padding: 44px 32px; max-width: 400px; width: 100%; text-align: center;
    }
    .logo { width: 170px; height: auto; margin-bottom: 28px; }
    .check {
      width: 56px; height: 56px; border-radius: 28px; background: #EAF5EF; color: #2E6A57;
      font-size: 28px; line-height: 56px; margin: 0 auto 20px;
    }
    h1 { color: #1A1A1A; font-size: 24px; letter-spacing: -0.5px; margin: 0 0 12px; }
    p { color: #5A5A5A; font-size: 15px; line-height: 23px; margin: 0 0 28px; }
    .btn {
      display: inline-block; background: #1A1A1A; color: #fff; text-decoration: none;
      font-size: 15px; font-weight: 600; padding: 14px 40px; border-radius: 999px;
    }
    .hint { color: #9A9A95; font-size: 13px; margin-top: 20px; margin-bottom: 0; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="https://lqdfwhvlqsxuzxxsfudi.supabase.co/storage/v1/object/public/brand/logo-florida.png" alt="Ópticas Florida Inca">
    <div class="check">✓</div>
    <h1>¡Email confirmado!</h1>
    <p>Tu cuenta ya está verificada. Te llevamos de vuelta a la app para continuar con el alta…</p>
    <a class="btn" id="open-app" href="opticasflorida://">Abrir la app</a>
    <p class="hint">Si el botón no funciona, abre la app desde tu pantalla de inicio.</p>
  </main>
  <script>
    // Supabase adjunta la sesión en el fragmento (#access_token=...). El
    // fragmento nunca viaja a ningún servidor. Lo reenviamos a la app por su
    // esquema (opticasflorida://auth-callback#...) para que el paciente
    // aterrice logueado, y lo borramos de la barra/historial del navegador.
    (function () {
      var h = location.hash;
      if (h) history.replaceState(null, '', location.pathname);
      if (h && h.indexOf('access_token') !== -1) {
        var target = 'opticasflorida://auth-callback' + h;
        var btn = document.getElementById('open-app');
        if (btn) btn.href = target;
        location.href = target; // intento automático; el botón queda de respaldo
      }
    })();
  </script>
</body>
</html>
